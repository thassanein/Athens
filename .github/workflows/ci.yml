name: CI

on:
  pull_request:
  # Pushes to PR branches are covered by the pull_request event above; only run
  # the push trigger on main to avoid duplicate runs while a PR is open.
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # The bundled offline snapshot must match the canonical data/sitedata.json.
      - name: Snapshot is up to date
        run: |
          npm run gen:snapshot
          git diff --exit-code src/lib/sitedata.js \
            || (echo "::error::src/lib/sitedata.js is stale — run 'npm run gen:snapshot' and commit." && exit 1)
      - run: npm run build

  backend:
    name: Backend API (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: athens_compliance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: athens_compliance
      PORT: '4000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Apply schema
        run: npm run initdb
      - name: Seed portfolio
        run: npm run seed
      - name: Smoke-test the API end to end
        run: |
          node src/index.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          # wait for liveness
          for i in $(seq 1 30); do
            if curl -sf localhost:4000/api/health >/dev/null; then break; fi
            sleep 0.5
          done
          echo "health:"; curl -sf localhost:4000/api/health
          # validate /api/sites returns the seeded portfolio in the expected shape
          curl -sf localhost:4000/api/sites > /tmp/sites.json
          node -e '
            const j = require("/tmp/sites.json");
            const names = Object.keys(j);
            if (names.length < 30) throw new Error("expected the full portfolio (>=30 sites), got " + names.length);
            if (!names.some((n) => j[n].anchor)) throw new Error("no anchor site found");
            const sv = j["SVMRF"];
            if (!sv) throw new Error("expected site SVMRF in portfolio");
            for (const k of ["permits","leases","checklist","documents"]) {
              if (!Array.isArray(sv[k])) throw new Error("SVMRF."+k+" not an array");
            }
            // document links round-trip: per-permit doc + per-site folder/documents
            if (typeof sv.permits[0].doc !== "string") throw new Error("SVMRF permit missing doc link");
            if (typeof sv.folder !== "string" || !sv.documents.length) throw new Error("SVMRF missing folder/documents links");
            if (!sv.compliance || typeof sv.compliance.missing !== "number" || !Array.isArray(sv.compliance.categories)) throw new Error("SVMRF missing compliance data");
            // permit expiry dates come back as YYYY-MM-DD strings (or null)
            for (const n of names) for (const p of j[n].permits) {
              if (p.expires && !/^\d{4}-\d{2}-\d{2}$/.test(p.expires)) throw new Error("bad date: " + n + " " + p.expires);
            }
            const permits = Object.values(j).reduce((a, s) => a + s.permits.length, 0);
            console.log("OK:", names.length, "sites,", permits, "permits");
          '
          # exercise a write: create a field finding
          curl -sf -X POST localhost:4000/api/findings \
            -H "Content-Type: application/json" \
            -d "{\"site\":\"SVMRF\",\"dept\":\"ENV\",\"area\":\"Stormwater\",\"note\":\"CI smoke test finding\"}" \
            | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const j=JSON.parse(d);if(j.status!==\"open\"||j.source!==\"field\")throw new Error(\"unexpected finding: \"+d);console.log(\"created\",j.id)})"
          # audits: create -> save responses + complete -> read back
          AID=$(curl -sf -X POST localhost:4000/api/audits -H "Content-Type: application/json" \
            -d "{\"site\":\"SVMRF\",\"template\":\"mrf\"}" \
            | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const j=JSON.parse(d);if(!j.id)throw new Error(\"no audit id: \"+d);console.log(j.id)})")
          curl -sf -X PATCH "localhost:4000/api/audits/$AID" -H "Content-Type: application/json" \
            -d "{\"responses\":{\"mrf-0-0\":{\"val\":\"no\",\"note\":\"ci\"}},\"status\":\"complete\"}" >/dev/null
          curl -sf "localhost:4000/api/audits/$AID" \
            | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const a=JSON.parse(d);if(a.status!==\"complete\")throw new Error(\"audit not complete\");if(a.responses[\"mrf-0-0\"].val!==\"no\")throw new Error(\"audit response not saved\");console.log(\"audit OK\",a.id)})"
          # diagnostics surfaces for AI tools / crawlers (server-rendered, no JS)
          curl -sf localhost:4000/api/portfolio \
            | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const j=JSON.parse(d);if(j.total<30)throw new Error(\"portfolio total too low: \"+j.total);if(!j.tiers||typeof j.tiers.noncompliant!==\"number\")throw new Error(\"missing tiers\");if(!Array.isArray(j.sites)||!j.sites[0].status)throw new Error(\"missing per-site summary\");console.log(\"portfolio OK\",j.total)})"
          curl -sf localhost:4000/overview | grep -q '<h1>Athens Facility Compliance' || (echo '::error::/overview did not server-render' && exit 1)
          curl -sf localhost:4000/llms.txt | grep -q '/api/portfolio' || (echo '::error::/llms.txt missing endpoints' && exit 1)
          # per-facility detail (JSON + server-rendered HTML)
          curl -sf "localhost:4000/api/facility/SVMRF" \
            | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const j=JSON.parse(d);if(j.name!==\"SVMRF\"||!Array.isArray(j.permitsList))throw new Error(\"bad facility detail: \"+d);console.log(\"facility OK\",j.permitsList.length,\"permits\")})"
          curl -sf "localhost:4000/overview/SVMRF" | grep -q '<h1>SVMRF' || (echo '::error::/overview/:name did not server-render' && exit 1)
          curl -s -o /dev/null -w '%{http_code}' "localhost:4000/api/facility/DoesNotExist" | grep -q '404' || (echo '::error::unknown facility should 404' && exit 1)
          echo "diagnostics surfaces OK"
          # audit hygiene: review flags a wrong-form audit, and delete removes it
          BAD=$(curl -sf -X POST localhost:4000/api/audits -H "Content-Type: application/json" -d "{\"site\":\"SVMRF\",\"template\":\"landfill\"}" \
            | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>console.log(JSON.parse(d).id))")
          curl -sf localhost:4000/api/audits/review \
            | BAD=$BAD node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const j=JSON.parse(d);if(!j.mismatched.some(a=>a.id===process.env.BAD))throw new Error(\"review did not flag the mismatched audit\");console.log(\"review OK\",j.mismatchedCount,\"mismatched\")})"
          curl -sf -X DELETE "localhost:4000/api/audits/$BAD" >/dev/null
          curl -s -o /dev/null -w '%{http_code}' "localhost:4000/api/audits/$BAD" | grep -q '404' || (echo '::error::deleted audit should 404' && exit 1)
          echo "audit delete + review OK"
