<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0E11" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Set the saved theme before paint to avoid a flash (dark is the default).
      try { document.documentElement.setAttribute('data-theme', localStorage.getItem('evro.theme') || 'dark') } catch (e) {}
    </script>
    <!-- Fonts loaded non-blocking: a stylesheet <link> never withholds index.css
         (unlike a CSS @import), so the app paints styled even if fonts are slow. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" /></noscript>
    <meta
      name="description"
      content="Athens EVRO — the Enterprise Value Realization Operating System. Find, realize and sustain return across the $437.4M addressable spend base. Return-maximization model: ranks initiatives and opportunities by risk-adjusted value and ROI (no savings target)."
    />
    <title>Athens EVRO — Enterprise Value Realization Operating System</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      Athens EVRO is an interactive dashboard. Machine-readable summaries are available at
      <a href="/api/portfolio">/api/portfolio</a>, <a href="/api/exec">/api/exec</a>, and <a href="/llms.txt">/llms.txt</a>.
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
